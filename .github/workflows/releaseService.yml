name: Release Service

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Build service packages
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Generate changelog
        run: |
          FIRST_S9PK=$(ls *.s9pk | head -1)
          RELEASE_NOTES=$(start-cli s9pk inspect "$FIRST_S9PK" manifest \
            | jq -r '.releaseNotes // "No release notes provided."')
          {
            echo "## What's Changed"
            echo ""
            echo "${RELEASE_NOTES}"
            echo ""
            echo "## SHA256 Hashes"
            echo '```'
            sha256sum *.s9pk
            echo '```'
          } > change-log.txt
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          body_path: change-log.txt
          files: ./*.s9pk
